name: Bug report
description: Report a bug in the template scaffold or tooling
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows / macOS / Linux
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant output.
      render: shell
