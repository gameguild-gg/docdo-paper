name: Feature request
description: Suggest an improvement to the template
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should we change/add?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / non-goals
      description: What is explicitly out of scope?
