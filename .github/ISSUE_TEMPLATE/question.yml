name: Question
description: Ask a question about how to use the template
title: "question: "
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do (domain-agnostic description preferred)?
